<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudin Neupane | Portfolio</title>
    
    <!-- SEO Metadata -->
    <meta name="description" content="Personal portfolio of Sudin Neupane, a 1st-year CSIT student and developer specializing in web technologies, SEO optimization, and interactive design.">
    <meta name="author" content="Sudin Neupane">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS & Font Awesome via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            coral: '#ff6b6b',
                            blue: '#64b5f6',
                            green: '#81c784',
                            amber: '#ffb74d',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
      <!-- Premium Style Overrides -->
    <style>
        /* Base scroll and custom styles */
        html {
            background-color: #050608;
            scrollbar-width: thin;
            scrollbar-color: #1e293b #050608;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
        }

        /* Custom Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050608;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff6b6b;
        }

         .glass-card {
            background: rgba(10, 11, 15, 0.45);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: rgba(255, 107, 107, 0.35);
            box-shadow: 0 12px 40px 0 rgba(255, 107, 107, 0.12);
            transform: translateY(-6px);
        }

        /* Background grid overlay */
        .grid-overlay {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        }
         /* Animated Mesh Gradients */
        .mesh-glow-1 {
            background: radial-gradient(circle, rgba(255, 107, 107, 0.15) 0%, transparent 70%);
        }
        .mesh-glow-2 {
            background: radial-gradient(circle, rgba(100, 181, 246, 0.12) 0%, transparent 70%);
        }

        /* Gradient keyframe text */
        @keyframes textGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-text {
            background-size: 200% auto;
            animation: textGradient 6s linear infinite;
        }
         /* Interactive smooth custom cursor (Desktop) */
        #custom-cursor {
            width: 14px;
            height: 14px;
            background: rgba(255, 107, 107, 0.75);
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease, background 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.6);
        }

        @media (min-width: 1024px) {
            html, body, button, a, input, textarea {
                cursor: none;
            }
        }
         /* Scroll Animation States */
        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

</head>
<body class="relative min-h-screen bg-[#050608] selection:bg-brand-coral selection:text-white overflow-x-hidden">

    <!-- Smooth Mouse Follower Cursor (Desktop) -->
    <div id="custom-cursor" class="hidden lg:block"></div>

    <!-- Background Particle nodes canvas -->
    <canvas id="particles-canvas" class="fixed inset-0 pointer-events-none z-10"></canvas>

    <!-- Background Grid overlay -->
    <div class="fixed inset-0 pointer-events-none grid-overlay z-0 opacity-40"></div>

    <!-- Aesthetic Radial ambient mesh glow blobs -->
    <div class="fixed top-0 left-[-10%] w-[60vw] h-[60vw] mesh-glow-1 pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] mesh-glow-2 pointer-events-none z-0"></div>


    <!-- 1. Start Loader -->
    <div id="loader" class="fixed inset-0 bg-[#050608] z-50 flex flex-col items-center justify-center font-mono transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <!-- Stylized Launcher logo -->
            <div class="w-16 h-16 rounded-xl border border-brand-coral/30 bg-black/60 flex items-center justify-center shadow-[0_0_20px_rgba(255,107,107,0.2)] animate-pulse mb-6">
                <span class="text-xl font-bold font-display text-brand-coral">S</span>
            </div>
            
            <h1 class="text-md uppercase tracking-[0.2em] text-white/90 mb-2 font-display font-semibold">SUDIN NEUPANE</h1>
            <p class="text-xs text-slate-500 tracking-wider mb-8 uppercase font-mono">compiling boilerlab module</p>

            <!-- Loading progress track -->
            <div class="w-64 h-1.5 bg-slate-900 rounded-full overflow-hidden border border-white/5">
                <div id="loader-bar" class="h-full bg-gradient-to-r from-brand-coral via-brand-blue to-brand-green transition-all duration-75 ease-out" style="width: 0%;"></div>
            </div>
            <span id="loader-text" class="text-xs text-slate-400 mt-2">0%</span>
        </div>
    </div>


  <!-- 2. Sticky frosted Navigation Header / Dock -->
    <header class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-5xl z-40 transition-all duration-300">
        <nav class="flex items-center justify-between px-6 py-3.5 rounded-2xl border border-white/8 bg-black/40 backdrop-blur-xl shadow-[0_8px_32px_0_rgba(0,0,0,0.5)]">
